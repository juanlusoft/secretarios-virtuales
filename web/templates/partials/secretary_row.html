<tr id="row-{{ s.id }}">
  <td style="color:#e2e8f0">{{ s.name }}</td>
  <td class="chat-id">{{ s.telegram_chat_id or "—" }}</td>
  <td>
    {% if s.is_active %}
      <span class="badge-active">● activo</span>
    {% else %}
      <span class="badge-inactive">● inactivo</span>
    {% endif %}
  </td>
  <td class="msg-count">{{ s.msgs_today if s.is_active else "—" }}</td>
  <td>
    <button hx-post="/secretaries/{{ s.id }}/tools"
            hx-target="#row-{{ s.id }}"
            hx-swap="outerHTML"
            style="border:none;background:none;cursor:pointer;padding:0"
            title="{% if s.tools_enabled %}Desactivar herramientas{% else %}Activar herramientas{% endif %}">
      {% if s.tools_enabled %}
        <span style="background:#1c1917;color:#f97316;padding:2px 8px;border-radius:12px;font-size:11px">⚡ activo</span>
      {% else %}
        <span style="background:#1e293b;color:#475569;padding:2px 8px;border-radius:12px;font-size:11px">— off</span>
      {% endif %}
    </button>
  </td>
  <td style="display:flex;gap:6px">
    <a href="/messages?to={{ s.id }}" class="btn btn-sm btn-blue">Mensaje</a>
    {% if s.is_active %}
    <button class="btn btn-sm btn-red"
            hx-delete="/secretaries/{{ s.id }}"
            hx-target="#row-{{ s.id }}"
            hx-swap="outerHTML"
            hx-confirm="¿Desactivar a {{ s.name }}?">Borrar</button>
    {% endif %}
  </td>
</tr>
