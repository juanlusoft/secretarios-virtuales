{% extends "base.html" %}
{% block content %}

<div class="form-card">
  <div style="color:#e2e8f0;font-weight:600;margin-bottom:14px">Enviar mensaje</div>

  <div id="send-result"></div>

  <form hx-post="/messages/send"
        hx-target="#send-result"
        hx-swap="innerHTML"
        hx-on::after-request="if(event.detail.successful){this.reset();}">

    <label class="form-label">Destinatarios</label>
    <div class="checkbox-group">
      <label class="checkbox-pill">
        <input type="checkbox" name="broadcast" id="chk-all"
               onchange="document.querySelectorAll('.recip-chk').forEach(c=>c.disabled=this.checked)">
        Todos
      </label>
      {% for s in secretaries %}
      {% if s.is_active %}
      <label class="checkbox-pill">
        <input type="checkbox" name="recipients" value="{{ s.id }}"
               class="recip-chk"
               {% if preselected == s.id %}checked{% endif %}>
        {{ s.name }}
      </label>
      {% endif %}
      {% endfor %}
    </div>

    <label class="form-label">Mensaje</label>
    <textarea name="text" class="form-input" placeholder="Mañana hay reunión a las 10h..."></textarea>

    <button type="submit" class="btn btn-primary" style="width:100%">Enviar →</button>
  </form>
</div>

{% endblock %}
